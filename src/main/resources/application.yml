server:
  port: ${SERVER_PORT:8080}
  servlet:
    multipart:
      max-file-size: ${MAX_FILE_SIZE:100MB}
      max-request-size: ${MAX_REQUEST_SIZE:100MB}
  compression:
    enabled: true
    mime-types: application/json,application/xml,text/html,text/xml,text/plain
  error:
    include-message: always
    include-binding-errors: always

spring:
  application:
    name: enhanced-document-identification-api
  
  servlet:
    multipart:
      enabled: true
      resolve-lazily: true
  
  jackson:
    serialization:
      write-dates-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: false
  
  cache:
    type: caffeine
    caffeine:
      spec: maximumSize=1000,expireAfterWrite=30m
  
  task:
    execution:
      pool:
        core-size: 4
        max-size: 16
        queue-capacity: 100
      thread-name-prefix: doc-async-

# Google Cloud Configuration
google:
  cloud:
    project-id: ${GOOGLE_CLOUD_PROJECT:pdlgcpcloud}
    location: ${GOOGLE_CLOUD_LOCATION:us-central1}
    vertex-ai:
      model: ${GEMINI_MODEL:gemini-2.0-flash}
      temperature: ${GEMINI_TEMPERATURE:0.1}
      max-tokens: ${GEMINI_MAX_TOKENS:50}
      top-p: ${GEMINI_TOP_P:0.8}
      top-k: ${GEMINI_TOP_K:40}

# Application Configuration
app:
  name: Enhanced Document Identification API
  version: 2.0.0
  description: Advanced document classification with AI/ML
  
  processing:
    max-concurrent-requests: ${MAX_CONCURRENT_REQUESTS:10}
    timeout-seconds: ${PROCESSING_TIMEOUT:300}
    retry-attempts: ${RETRY_ATTEMPTS:3}
    
  supported-image-extensions:
    - .png
    - .jpg
    - .jpeg
    - .webp
    - .bmp
    - .tiff
    - .gif
    
  document-types:
    - Aadhaar
    - PAN
    - Voter ID
    - Driving License
    - Passport
    - Ration Card
    - None
    
  confidence:
    threshold: ${CONFIDENCE_THRESHOLD:0.7}
    
  cache:
    enabled: ${CACHE_ENABLED:true}
    ttl-minutes: ${CACHE_TTL:30}

# Management and Monitoring
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,env,configprops
      base-path: /actuator
  endpoint:
    health:
      show-details: always
      show-components: always
    metrics:
      enabled: true
    prometheus:
      enabled: true
  metrics:
    export:
      prometheus:
        enabled: true
    tags:
      application: ${spring.application.name}
      version: ${app.version}
  info:
    env:
      enabled: true
    java:
      enabled: true
    os:
      enabled: true

# OpenAPI Documentation
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
    operations-sorter: method
    tags-sorter: alpha
    try-it-out-enabled: true
  show-actuator: true

# Logging Configuration
logging:
  level:
    com.nishapdl.documentidentification: ${LOG_LEVEL:INFO}
    com.google.cloud: WARN
    org.springframework.web: ${WEB_LOG_LEVEL:INFO}
    org.springframework.cache: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level [%X{traceId:-},%X{spanId:-}] %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level [%X{traceId:-},%X{spanId:-}] %logger{36} - %msg%n"
  file:
    name: ${LOG_FILE:logs/document-identification.log}

---
# Development Profile
spring:
  config:
    activate:
      on-profile: dev
      
logging:
  level:
    com.nishapdl.documentidentification: DEBUG
    org.springframework.web: DEBUG
    
app:
  cache:
    enabled: false

---
# Production Profile
spring:
  config:
    activate:
      on-profile: prod
      
server:
  compression:
    enabled: true
  http2:
    enabled: true
    
logging:
  level:
    com.nishapdl.documentidentification: INFO
    root: WARN
    
management:
  endpoint:
    health:
      show-details: when-authorized

---
# Test Profile
spring:
  config:
    activate:
      on-profile: test
      
google:
  cloud:
    project-id: test-project
    location: us-central1
    vertex-ai:
      model: gemini-test
      
app:
  cache:
    enabled: false
  processing:
    timeout-seconds: 30
