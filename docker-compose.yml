version: '3.8'

services:
  # Enhanced Document Identification API
  document-api:
    build:
      context: .
      dockerfile: Dockerfile
    image: nishapdl/document-identification-api:2.0.0
    container_name: enhanced-doc-api
    ports:
      - "8080:8080"
      - "8081:8081"  # Management port
    environment:
      # Spring Configuration
      - SPRING_PROFILES_ACTIVE=prod
      - SERVER_PORT=8080
      - MANAGEMENT_SERVER_PORT=8081
      
      # Google Cloud Configuration
      - GOOGLE_CLOUD_PROJECT=${GOOGLE_CLOUD_PROJECT:-pdlgcpcloud}
      - GOOGLE_CLOUD_LOCATION=${GOOGLE_CLOUD_LOCATION:-us-central1}
      - GEMINI_MODEL=${GEMINI_MODEL:-gemini-2.0-flash}
      
      # Application Configuration
      - MAX_FILE_SIZE=100MB
      - CACHE_ENABLED=true
      - LOG_LEVEL=INFO
      - MAX_CONCURRENT_REQUESTS=20
      - PROCESSING_TIMEOUT=300
      - CONFIDENCE_THRESHOLD=0.7
      
      # JVM Configuration
      - JAVA_OPTS=-XX:+UseContainerSupport -XX:MaxRAMPercentage=75.0 -XX:+UseG1GC
    volumes:
      # Mount service account key (update path as needed)
      - ${GOOGLE_APPLICATION_CREDENTIALS:-./service-account.json}:/app/service-account.json:ro
      # Mount logs directory
      - ./logs:/app/logs
      # Mount temp directory for processing
      - ./temp:/app/temp
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: unless-stopped
    networks:
      - doc-api-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.doc-api.rule=Host(`api.nishapdl.com`)"
      - "traefik.http.services.doc-api.loadbalancer.server.port=8080"

  # Prometheus for metrics collection
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=200h'
      - '--web.enable-lifecycle'
    restart: unless-stopped
    networks:
      - doc-api-network

  # Grafana for metrics visualization
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin123
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
    restart: unless-stopped
    networks:
      - doc-api-network

  # Redis for distributed caching (optional)
  redis:
    image: redis:7-alpine
    container_name: redis-cache
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    restart: unless-stopped
    networks:
      - doc-api-network

  # Nginx reverse proxy (optional)
  nginx:
    image: nginx:alpine
    container_name: nginx-proxy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - document-api
    restart: unless-stopped
    networks:
      - doc-api-network

volumes:
  prometheus_data:
    driver: local
  grafana_data:
    driver: local
  redis_data:
    driver: local

networks:
  doc-api-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
